<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable | Horizon Portal</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/authGuard.js"></script>
    <script src="/js/components.js" defer></script>
    <script src="/js/timetable.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="section-card">
            <h2>Academic Timetable</h2>
            <p>Your scheduled lectures, seminars, and continuity reviews.</p>
            
            <div class="content-grid-2" style="margin-top: 2rem;">
                <div class="section-card">
                    <h3 id="schedule-title">Schedule</h3>
                    <ul id="lecture-list" style="line-height: 1.8; list-style-type: none; padding-left: 0;">
                        <li>Loading timetable...</li>
                    </ul>
                </div>
                
                <div class="section-card">
                    <h3>Add Private Study / Lecture</h3>
                    <form id="addLectureForm" style="display:flex; flex-direction:column; gap: 1rem;">
                        <div>
                            <label style="font-size: 0.85rem; font-weight: bold;">Title</label>
                            <input type="text" id="lectureTitle" required style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                        <div>
                            <label style="font-size: 0.85rem; font-weight: bold;">Date & Time</label>
                            <input type="datetime-local" id="lectureDate" required style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
                        </div>
                        <button type="submit" class="btn btn-primary">Schedule Session</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
